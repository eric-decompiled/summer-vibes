<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070817" />
    <title>Kindness Blaster</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f7f2db;
        --cyan: #5ee7f2;
        --pink: #ff5d9e;
        --yellow: #ffd166;
        --night: #070817;
        --panel: #11142d;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at 50% 0%, #222550 0, transparent 38rem),
          var(--night);
        color: var(--ink);
        font-family: "Courier New", Courier, monospace;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 22px;
        overflow: hidden;
      }

      .arcade {
        width: min(1040px, 100%);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 9px;
        color: var(--yellow);
        font-size: clamp(.68rem, 1.5vw, .86rem);
        font-weight: 900;
        letter-spacing: .2em;
        text-transform: uppercase;
        text-shadow: 2px 2px #a52b62;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(1.65rem, 5vw, 3.5rem);
        line-height: .9;
        letter-spacing: .04em;
        text-transform: uppercase;
        text-shadow: 4px 4px 0 #273b9d, 7px 7px 0 #ff5d9e;
      }

      .cabinet {
        position: relative;
        border: 5px solid var(--ink);
        box-shadow:
          0 0 0 5px #343975,
          0 0 0 10px #11142d,
          14px 14px 0 #03040d;
        background: #02030c;
        image-rendering: pixelated;
      }

      canvas {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #050617;
        image-rendering: pixelated;
      }

      .scanlines {
        pointer-events: none;
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 3px,
          rgba(0, 0, 0, .18) 4px
        );
        mix-blend-mode: multiply;
      }

      .help {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px 24px;
        margin-top: 22px;
        font-size: clamp(.72rem, 1.8vw, .9rem);
        font-weight: 900;
        letter-spacing: .06em;
        text-transform: uppercase;
      }

      .help span { color: #a9aed8; }
      kbd {
        border: 2px solid var(--ink);
        border-bottom-width: 4px;
        padding: 3px 7px;
        color: var(--yellow);
        background: #181b3c;
        font: inherit;
      }

      .music-toggle {
        border: 2px solid var(--cyan);
        border-bottom-width: 4px;
        padding: 3px 8px;
        color: var(--cyan);
        background: #11142d;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      .music-toggle:active { transform: translateY(2px); border-bottom-width: 2px; }

      .touch {
        display: none;
        justify-content: space-between;
        align-items: end;
        margin-top: 14px;
        user-select: none;
        touch-action: none;
      }

      .dpad {
        display: grid;
        grid-template-columns: repeat(3, 44px);
        grid-template-rows: repeat(2, 44px);
        gap: 4px;
      }

      .touch button {
        min-width: 44px;
        min-height: 44px;
        border: 2px solid var(--ink);
        border-bottom-width: 5px;
        border-radius: 0;
        background: #1c2049;
        color: var(--ink);
        font: 900 1rem "Courier New", monospace;
      }

      .touch button:active { transform: translateY(3px); border-bottom-width: 2px; }
      .up { grid-column: 2; }
      .left { grid-column: 1; grid-row: 2; }
      .down { grid-column: 2; grid-row: 2; }
      .right { grid-column: 3; grid-row: 2; }
      .fire { width: 92px; color: #101225 !important; background: var(--yellow) !important; }

      @media (pointer: coarse), (max-height: 680px) {
        body { overflow: auto; padding: 12px; }
        .touch { display: flex; }
        .help { margin-top: 16px; }
      }
    </style>
  </head>
  <body>
    <main class="arcade">
      <p class="eyebrow">A one-screen kindness mission</p>
      <h1>Kindness Blaster</h1>

      <div class="cabinet">
        <canvas id="game" width="960" height="540" aria-label="Kindness Blaster arcade game">
          Your browser needs canvas support to play Kindness Blaster.
        </canvas>
        <div class="scanlines" aria-hidden="true"></div>
      </div>

      <div class="help" aria-label="Controls">
        <span><kbd>W A S D</kbd> move</span>
        <span><kbd>Space</kbd> shoot donuts</span>
        <span><kbd>1 2 3 4 5</kbd> choose upgrades / avatar</span>
        <span><kbd>Enter</kbd> restart</span>
        <button class="music-toggle" id="music-toggle" type="button" aria-pressed="true">Music: On</button>
      </div>

      <div class="touch" aria-label="Touch controls">
        <div class="dpad">
          <button class="up" data-key="w" aria-label="Move up">▲</button>
          <button class="left" data-key="a" aria-label="Move left">◀</button>
          <button class="down" data-key="s" aria-label="Move down">▼</button>
          <button class="right" data-key="d" aria-label="Move right">▶</button>
        </div>
        <button class="fire" data-key=" " aria-label="Shoot">NICE!</button>
      </div>
    </main>

    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;

      const W = canvas.width;
      const H = canvas.height;
      const keys = new Set();
      const donutFrostings = ["#ff5d9e", "#5ee7f2", "#a78bfa", "#80ef80"];
      const winsKey = "kindness-blaster-wins";
      const avatarKey = "kindness-blaster-avatars";
      const avatarOptions = [
        { name: "cat", cost: 0, color: "#f5a25d" },
        { name: "bunny", cost: 2, color: "#f7f2db" },
        { name: "frog", cost: 3, color: "#80ef80" },
        { name: "bear", cost: 4, color: "#a66a49" },
        { name: "fox", cost: 5, color: "#ff7a45" }
      ];
      const music = { context: null, enabled: true, timer: null, step: 0 };
      let last = 0;
      let state;

      const lead = [76, 79, 83, 88, 79, 83, 86, 91, 72, 76, 79, 84, 76, 79, 83, 88];
      const bass = [40, 40, 43, 43, 36, 36, 38, 38];

      function frequency(note) {
        return 440 * Math.pow(2, (note - 69) / 12);
      }

      function playTone(note, duration, type, volume, offset = 0) {
        if (!music.context || note == null) return;
        const now = music.context.currentTime + offset;
        const oscillator = music.context.createOscillator();
        const gain = music.context.createGain();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency(note), now);
        gain.gain.setValueAtTime(.0001, now);
        gain.gain.exponentialRampToValueAtTime(volume, now + .012);
        gain.gain.exponentialRampToValueAtTime(.0001, now + duration);
        oscillator.connect(gain).connect(music.context.destination);
        oscillator.start(now);
        oscillator.stop(now + duration + .02);
      }

      function musicStep() {
        if (!music.enabled || !music.context) return;
        const beat = music.step % 16;
        playTone(lead[beat], .08, "square", .03);
        playTone(lead[beat] - 12, .06, "triangle", .018, .012);
        if (beat % 2 === 0) playTone(bass[(beat / 2) % bass.length], .16, "sawtooth", .045);
        playTone(96 + (beat % 3) * 3, .018, "square", .009, .01);
        if (beat % 4 === 0) playTone(28, .055, "sine", .07);
        if (beat % 4 === 2) playTone(55, .028, "square", .016);
        music.step += 1;
      }

      function playSfx(kind) {
        if (!music.enabled || !music.context) return;
        if (kind === "shot") playTone(91, .045, "square", .035);
        if (kind === "hit") playTone(62, .07, "sawtooth", .045);
        if (kind === "deflect") {
          playTone(94, .045, "square", .035);
          playTone(101, .07, "triangle", .03, .035);
        }
        if (kind === "shield") {
          playTone(76, .06, "triangle", .045);
          playTone(83, .10, "square", .035, .045);
        }
        if (kind === "upgrade") {
          playTone(69, .07, "square", .04);
          playTone(76, .12, "square", .04, .06);
        }
        if (kind === "win") [72, 76, 79, 84].forEach((note, index) => playTone(note, .12, "square", .04, index * .055));
        if (kind === "lose") [62, 58, 53].forEach((note, index) => playTone(note, .14, "sawtooth", .045, index * .08));
      }

      function startMusic() {
        if (!music.enabled) return;
        if (!music.context) music.context = new (window.AudioContext || window.webkitAudioContext)();
        music.context.resume();
        if (!music.timer) {
          musicStep();
          music.timer = setInterval(musicStep, 100);
        }
      }

      function toggleMusic() {
        music.enabled = !music.enabled;
        const button = document.querySelector("#music-toggle");
        button.textContent = `Music: ${music.enabled ? "On" : "Off"}`;
        button.setAttribute("aria-pressed", String(music.enabled));
        if (music.enabled) startMusic();
        else if (music.timer) {
          clearInterval(music.timer);
          music.timer = null;
          music.context?.suspend();
        }
      }

      function readWins() {
        try { return Math.max(0, Number(localStorage.getItem(winsKey)) || 0); }
        catch { return 0; }
      }

      function saveWins() {
        try { localStorage.setItem(winsKey, String(state.wins)); }
        catch { /* The game still works if storage is unavailable. */ }
      }

      function readUnlockedAvatars() {
        try {
          const saved = JSON.parse(localStorage.getItem(avatarKey));
          return new Set(["cat", ...(Array.isArray(saved) ? saved : [])]);
        } catch { return new Set(["cat"]); }
      }

      function saveUnlockedAvatars() {
        try { localStorage.setItem(avatarKey, JSON.stringify([...state.unlocked])); }
        catch { /* Avatar unlocks remain available for this play session. */ }
      }

      const stars = Array.from({ length: 72 }, (_, i) => ({
        x: (i * 137) % W,
        y: 52 + ((i * 83) % (H - 72)),
        size: i % 9 === 0 ? 4 : i % 3 === 0 ? 2 : 1,
        speed: 18 + (i % 4) * 18
      }));

      function reset() {
        state = {
          mode: "start",
          time: 0,
          score: 0,
          wins: readWins(),
          unlocked: readUnlockedAvatars(),
          shopMessage: "",
          lastLossWasWin: false,
          round: 1,
          nextRoundAt: 0,
          upgrades: { rapid: 0, thrusters: 0, shield: 0 },
          player: {
            x: W / 2 - 28, y: H - 92, w: 56, h: 48, speed: 260, cooldown: 0,
            pinkShield: 0, invulnerableUntil: 0, animal: "cat"
          },
          monsters: [],
          words: [],
          bolts: [],
          sparks: []
        };
        state.monsters = buildWave(1);
      }

      function buildWave(round) {
        const count = 2 + (round - 1) * 3;
        const columns = Math.min(5, count);
        const scale = count <= 2 ? .78 : count <= 5 ? .58 : .47;
        const width = 108 * scale;
        const height = 96 * scale;
        const gap = (W - 70) / columns;
        const hp = 5;

        return Array.from({ length: count }, (_, index) => {
          const column = index % columns;
          const row = Math.floor(index / columns);
          const x = 35 + column * gap + (gap - width) / 2;
          return {
            x,
            y: 64 + row * (height + 18),
            w: width,
            h: height,
            scale,
            hp,
            maxHp: hp,
            hitStreak: 0,
            vx: ((index + round) % 2 ? 1 : -1) * (62 + Math.random() * 32 + round * 8),
            vy: (index % 2 ? 1 : -1) * (32 + Math.random() * 26 + round * 5),
            shot: .8 + Math.random() * .9,
            smiling: false
          };
        });
      }

      function loadRound(round) {
        state.round = round;
        state.mode = "playing";
        state.words = [];
        state.bolts = [];
        state.player.x = W / 2 - state.player.w / 2;
        state.player.y = H - 92;
        state.monsters = buildWave(round);
      }

      function chooseUpgrade(type) {
        if (state.mode !== "upgrade") return;
        state.upgrades[type] += 1;
        playSfx("upgrade");
        state.mode = "avatar";
      }

      function chooseAvatar(animal) {
        if (state.mode !== "avatar" && state.mode !== "start") return;
        const option = avatarOptions.find(item => item.name === animal);
        if (!option) return;
        if (!state.unlocked.has(animal)) {
          if (state.wins < option.cost) {
            state.shopMessage = `NEED ${option.cost - state.wins} MORE WINS TO UNLOCK ${animal.toUpperCase()}`;
            return;
          }
          state.wins -= option.cost;
          state.unlocked.add(animal);
          saveWins();
          saveUnlockedAvatars();
          state.shopMessage = `${animal.toUpperCase()} UNLOCKED!`;
        }
        state.player.animal = animal;
        playSfx("upgrade");
        if (state.mode === "start") state.mode = "playing";
        else loadRound(state.round + 1);
      }

      function loseGame() {
        if (state.mode !== "playing") return;
        state.lastLossWasWin = state.wins > 0;
        state.wins = Math.max(0, state.wins - 1);
        saveWins();
        state.mode = "lost";
        playSfx("lose");
        addSparks(state.player.x + state.player.w / 2, state.player.y + state.player.h / 2, "#ff5d9e");
      }

      function takeShipHit(fromMonster = false) {
        const p = state.player;
        if (p.pinkShield > 0) {
          p.pinkShield -= 1;
          addSparks(p.x + p.w / 2, p.y + p.h / 2, "#ff5d9e");
          playSfx("shield");
        } else if (state.upgrades.shield > 0) {
          state.upgrades.shield -= 1;
          addSparks(p.x + p.w / 2, p.y + p.h / 2, "#5ee7f2");
          playSfx("shield");
        } else {
          loseGame();
          return;
        }
        if (fromMonster) {
          p.y = Math.min(H - 38 - p.h, p.y + 88);
          p.invulnerableUntil = state.time + .7;
        }
      }

      function rectsTouch(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x &&
          a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function deflectionCore(word) {
        return { x: word.x + word.w / 2 - 7, y: word.y + 3, w: 14, h: 12 };
      }

      function shootDonut() {
        const p = state.player;
        if (state.mode !== "playing" || p.cooldown > 0) return;
        state.words.push({
          x: p.x + p.w / 2 - 10, y: p.y - 16, w: 20, h: 20,
          frosting: donutFrostings[Math.floor(Math.random() * donutFrostings.length)],
          speed: 430
        });
        p.cooldown = Math.max(.09, .28 - state.upgrades.rapid * .035);
        playSfx("shot");
      }

      function addSparks(x, y, color) {
        for (let i = 0; i < 9; i++) {
          state.sparks.push({
            x, y, vx: (Math.random() - .5) * 210, vy: (Math.random() - .5) * 210,
            life: .45, color
          });
        }
      }

      function update(dt) {
        state.time += dt;
        for (const star of stars) {
          star.y += star.speed * dt;
          if (star.y > H + 5) { star.y = 52; star.x = Math.random() * W; }
        }

        for (const spark of state.sparks) {
          spark.x += spark.vx * dt;
          spark.y += spark.vy * dt;
          spark.life -= dt;
        }
        state.sparks = state.sparks.filter(s => s.life > 0);

        if (state.mode === "smiling") {
          if (state.time >= state.nextRoundAt) state.mode = "upgrade";
          return;
        }
        if (state.mode !== "playing") return;

        const p = state.player;
        const dx = (keys.has("d") ? 1 : 0) - (keys.has("a") ? 1 : 0);
        const dy = (keys.has("s") ? 1 : 0) - (keys.has("w") ? 1 : 0);
        const length = Math.hypot(dx, dy) || 1;
        const boostedSpeed = p.speed + state.upgrades.thrusters * 42;
        p.x += dx / length * boostedSpeed * dt;
        p.y += dy / length * boostedSpeed * dt;
        p.x = Math.max(25, Math.min(W - 25 - p.w, p.x));
        p.y = Math.max(H * .48, Math.min(H - 38 - p.h, p.y));
        p.cooldown -= dt;
        if (keys.has(" ")) shootDonut();

        for (const monster of state.monsters) {
          if (monster.smiling) continue;
          monster.x += monster.vx * dt;
          monster.y += monster.vy * dt;
          if (monster.x < 22 || monster.x + monster.w > W - 22) {
            monster.x = Math.max(22, Math.min(W - 22 - monster.w, monster.x));
            monster.vx *= -1;
          }
          if (monster.y < 62 || monster.y + monster.h > H - 100) {
            monster.y = Math.max(62, Math.min(H - 100 - monster.h, monster.y));
            monster.vy *= -1;
          }
          monster.shot -= dt;
          if (monster.shot <= 0) {
            state.bolts.push({ x: monster.x + monster.w / 2 - 5, y: monster.y + monster.h - 2, w: 10, h: 18, speed: 190 + state.round * 14 });
            monster.shot = Math.max(.72, 1.75 - state.round * .08) + Math.random() * .55;
          }
        }

        for (const word of state.words) word.y -= word.speed * dt;
        for (const bolt of state.bolts) bolt.y += bolt.speed * dt;

        for (const word of state.words) {
          for (const bolt of state.bolts) {
            if (!word.hit && !bolt.hit && rectsTouch(deflectionCore(word), bolt)) {
              word.hit = true;
              bolt.hit = true;
              addSparks(bolt.x + bolt.w / 2, bolt.y + bolt.h / 2, "#5ee7f2");
              playSfx("deflect");
            }
          }
        }

        for (const word of state.words) {
          for (const monster of state.monsters) {
            if (!word.hit && !monster.smiling && rectsTouch(word, monster)) {
              word.hit = true;
              const impactX = monster.x + monster.w / 2;
              const impactY = monster.y + monster.h / 2;
              monster.hp -= 1;
              monster.hitStreak += 1;
              state.score += 100;
              addSparks(impactX, word.y, "#ffd166");
              playSfx("hit");
              if (monster.hp <= 0) {
                monster.smiling = true;
                addSparks(impactX, impactY, "#5ee7f2");
                playSfx("win");
              } else if (monster.hitStreak === 2) {
                monster.hitStreak = 0;
                state.player.pinkShield = Math.min(3, state.player.pinkShield + 1);
                addSparks(state.player.x + state.player.w / 2, state.player.y + state.player.h / 2, "#ff5d9e");
                playSfx("shield");
              }
            }
          }
        }

        if (state.monsters.every(monster => monster.smiling)) {
          state.wins += 1;
          saveWins();
          state.mode = "smiling";
          state.nextRoundAt = state.time + 1.3;
          state.bolts = [];
          playSfx("win");
        }

        for (const bolt of state.bolts) {
          if (!bolt.hit && rectsTouch(bolt, p)) {
            bolt.hit = true;
            takeShipHit();
          }
        }

        if (state.time >= p.invulnerableUntil && state.monsters.some(monster => !monster.smiling && rectsTouch(p, monster))) {
          takeShipHit(true);
        }
        state.words = state.words.filter(w => !w.hit && w.y > 40);
        state.bolts = state.bolts.filter(b => !b.hit && b.y < H + 30);
      }

      function pixelRect(x, y, w, h, color) {
        ctx.fillStyle = color;
        ctx.fillRect(Math.round(x), Math.round(y), w, h);
      }

      function drawDonut(donut) {
        const x = donut.x;
        const y = donut.y;
        pixelRect(x + 5, y, 10, 3, "#d69054");
        pixelRect(x + 2, y + 3, 16, 3, donut.frosting);
        pixelRect(x, y + 6, 20, 8, donut.frosting);
        pixelRect(x + 2, y + 14, 16, 3, "#d69054");
        pixelRect(x + 5, y + 17, 10, 3, "#d69054");
        pixelRect(x + 7, y + 7, 6, 6, "#070817");
        pixelRect(x + 3, y + 7, 3, 2, "#f7f2db");
        pixelRect(x + 14, y + 11, 3, 2, "#ffd166");
      }

      function drawShip(p) {
        if (p.pinkShield > 0) {
          ctx.strokeStyle = "#ff5d9e";
          ctx.lineWidth = 4;
          ctx.strokeRect(Math.round(p.x - 12), Math.round(p.y - 12), p.w + 24, p.h + 24);
        }
        if (state.upgrades.shield > 0) {
          ctx.strokeStyle = "#ffd166";
          ctx.lineWidth = 3;
          ctx.strokeRect(Math.round(p.x - 8), Math.round(p.y - 8), p.w + 16, p.h + 16);
        }
        if (p.animal === "bunny") drawBunny(p);
        else if (p.animal === "bear") drawBear(p);
        else if (p.animal === "fox") drawFox(p);
        else if (p.animal === "frog") drawFrog(p);
        else drawCat(p);
      }

      function drawFace(p, fur, innerEar, nose) {
        pixelRect(p.x + 10, p.y + 13, 36, 27, fur);
        pixelRect(p.x + 15, p.y + 22, 5, 6, "#070817");
        pixelRect(p.x + 36, p.y + 22, 5, 6, "#070817");
        pixelRect(p.x + 17, p.y + 22, 2, 2, "#f7f2db");
        pixelRect(p.x + 38, p.y + 22, 2, 2, "#f7f2db");
        pixelRect(p.x + 26, p.y + 30, 5, 4, nose);
        pixelRect(p.x + 23, p.y + 34, 11, 3, "#070817");
        pixelRect(p.x + 5, p.y + 34, 9, 9, fur);
        pixelRect(p.x + 42, p.y + 34, 9, 9, fur);
        pixelRect(p.x + 17, p.y + 40, 9, 6, innerEar);
        pixelRect(p.x + 31, p.y + 40, 9, 6, innerEar);
      }

      function drawCat(p) {
        pixelRect(p.x + 8, p.y + 4, 12, 14, "#f5a25d");
        pixelRect(p.x + 36, p.y + 4, 12, 14, "#f5a25d");
        pixelRect(p.x + 11, p.y + 8, 6, 7, "#ffcad4");
        pixelRect(p.x + 39, p.y + 8, 6, 7, "#ffcad4");
        drawFace(p, "#f5a25d", "#f7f2db", "#ff5d9e");
        pixelRect(p.x + 0, p.y + 26, 8, 13, "#f5a25d");
        pixelRect(p.x + 2, p.y + 21, 6, 7, "#f5a25d");
      }

      function drawBunny(p) {
        pixelRect(p.x + 13, p.y, 10, 20, "#f7f2db");
        pixelRect(p.x + 33, p.y, 10, 20, "#f7f2db");
        pixelRect(p.x + 16, p.y + 3, 4, 13, "#ffcad4");
        pixelRect(p.x + 36, p.y + 3, 4, 13, "#ffcad4");
        drawFace(p, "#f7f2db", "#c4b5fd", "#ff8fb8");
      }

      function drawBear(p) {
        pixelRect(p.x + 8, p.y + 7, 13, 13, "#a66a49");
        pixelRect(p.x + 35, p.y + 7, 13, 13, "#a66a49");
        pixelRect(p.x + 11, p.y + 10, 7, 7, "#f3c995");
        pixelRect(p.x + 38, p.y + 10, 7, 7, "#f3c995");
        drawFace(p, "#a66a49", "#f3c995", "#5c392b");
        pixelRect(p.x + 21, p.y + 29, 14, 9, "#f3c995");
      }

      function drawFox(p) {
        pixelRect(p.x + 7, p.y + 3, 14, 17, "#ff7a45");
        pixelRect(p.x + 35, p.y + 3, 14, 17, "#ff7a45");
        pixelRect(p.x + 10, p.y + 7, 7, 8, "#070817");
        pixelRect(p.x + 39, p.y + 7, 7, 8, "#070817");
        drawFace(p, "#ff7a45", "#f7f2db", "#070817");
        pixelRect(p.x + 18, p.y + 31, 20, 9, "#f7f2db");
      }

      function drawFrog(p) {
        pixelRect(p.x + 10, p.y + 5, 12, 15, "#80ef80");
        pixelRect(p.x + 34, p.y + 5, 12, 15, "#80ef80");
        pixelRect(p.x + 7, p.y + 15, 42, 26, "#80ef80");
        pixelRect(p.x + 13, p.y + 10, 6, 7, "#f7f2db");
        pixelRect(p.x + 37, p.y + 10, 6, 7, "#f7f2db");
        pixelRect(p.x + 15, p.y + 12, 3, 4, "#070817");
        pixelRect(p.x + 39, p.y + 12, 3, 4, "#070817");
        pixelRect(p.x + 18, p.y + 28, 20, 4, "#070817");
        pixelRect(p.x + 22, p.y + 32, 12, 4, "#ff8fb8");
        pixelRect(p.x + 3, p.y + 35, 10, 9, "#80ef80");
        pixelRect(p.x + 43, p.y + 35, 10, 9, "#80ef80");
      }

      function drawBoss(b, smiling) {
        const bob = smiling ? Math.sin(state.time * 5) * 4 : 0;
        ctx.save();
        ctx.translate(Math.round(b.x), Math.round(b.y + bob));
        ctx.scale(b.scale, b.scale);
        pixelRect(12, 0, 68, 8, "#ff5d9e");
        pixelRect(4, 8, 84, 72, "#ff5d9e");
        pixelRect(12, 80, 20, 16, "#ff5d9e");
        pixelRect(60, 80, 20, 16, "#ff5d9e");
        pixelRect(-8, 20, 12, 38, "#ff5d9e");
        pixelRect(88, 20, 12, 38, "#ff5d9e");
        pixelRect(19, 25, 14, 14, "#070817");
        pixelRect(59, 25, 14, 14, "#070817");
        pixelRect(23, 25, 5, 5, "#f7f2db");
        pixelRect(63, 25, 5, 5, "#f7f2db");

        if (smiling) {
          pixelRect(24, 53, 8, 8, "#070817");
          pixelRect(32, 61, 28, 8, "#070817");
          pixelRect(60, 53, 8, 8, "#070817");
        } else {
          pixelRect(25, 61, 42, 8, "#070817");
          pixelRect(33, 53, 26, 8, "#070817");
        }
        ctx.restore();
      }

      function drawHud() {
        pixelRect(0, 0, W, 48, "#11142d");
        ctx.fillStyle = "#f7f2db";
        ctx.font = "bold 18px Courier New";
        ctx.textBaseline = "middle";
        ctx.fillText(`ROUND ${state.round}`, 20, 24);
        ctx.font = "bold 11px Courier New";
        ctx.fillStyle = "#8c94d8";
        ctx.fillText(`UPGRADES  R${state.upgrades.rapid} T${state.upgrades.thrusters} S${state.upgrades.shield} P${state.player.pinkShield}`, 20, 42);
        ctx.font = "bold 18px Courier New";
        ctx.fillStyle = "#ffd166";
        ctx.textAlign = "center";
        ctx.fillText(`KINDNESS ${String(state.score).padStart(4, "0")}`, W / 2, 18);
        ctx.font = "bold 12px Courier New";
        ctx.fillStyle = "#5ee7f2";
        ctx.fillText(`WINS ${state.wins}`, W / 2, 38);
        ctx.font = "bold 18px Courier New";
        ctx.textAlign = "right";
        ctx.fillStyle = "#f7f2db";
        const cheered = state.monsters.filter(monster => monster.smiling).length;
        ctx.fillText(`GRUMPS ${cheered}/${state.monsters.length}`, W - 20, 24);
        ctx.textAlign = "left";
      }

      function drawOverlay() {
        if (state.mode === "playing") return;
        ctx.fillStyle = "rgba(3, 4, 13, .76)";
        ctx.fillRect(0, 48, W, H - 48);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        if (state.mode === "smiling") {
          ctx.fillStyle = "#5ee7f2";
          ctx.font = "bold 52px Courier New";
          ctx.fillText("THE GRUMPS ARE SMILING!", W / 2, 185);
          ctx.fillStyle = "#f7f2db";
          ctx.font = "bold 22px Courier New";
          ctx.fillText("PREPARING YOUR NEXT UPGRADE...", W / 2, 235);
        } else if (state.mode === "upgrade") {
          ctx.fillStyle = "#ffd166";
          ctx.font = "bold 36px Courier New";
          ctx.fillText("CHOOSE A SHIP UPGRADE", W / 2, 126);
          ctx.font = "bold 18px Courier New";
          drawUpgradeCard(1, 185, "RAPID KINDNESS", "shoot faster", "#5ee7f2");
          drawUpgradeCard(2, 263, "TURBO THRUSTERS", "move faster", "#ff5d9e");
          drawUpgradeCard(3, 341, "FRIENDLY SHIELD", "block one hit", "#ffd166");
          ctx.fillStyle = "#f7f2db";
          ctx.font = "bold 16px Courier New";
          ctx.fillText("NEXT: CHOOSE YOUR PILOT", W / 2, 445);
        } else if (state.mode === "avatar" || state.mode === "start") {
          ctx.fillStyle = "#5ee7f2";
          ctx.font = "bold 34px Courier New";
          ctx.fillText(state.mode === "start" ? "CHOOSE YOUR PILOT" : "PICK YOUR NEXT PILOT", W / 2, 126);
          drawAvatarCard(1, "cat", 75, 170, "#f5a25d");
          drawAvatarCard(2, "bunny", 355, 170, "#f7f2db");
          drawAvatarCard(3, "frog", 635, 170, "#80ef80");
          drawAvatarCard(4, "bear", 215, 315, "#a66a49");
          drawAvatarCard(5, "fox", 495, 315, "#ff7a45");
          ctx.fillStyle = "#f7f2db";
          ctx.font = "bold 16px Courier New";
          ctx.fillText(state.shopMessage || `WINS ${state.wins} • UNLOCK NEW PILOTS WITH WINS`, W / 2, 465);
        } else {
          ctx.fillStyle = "#ff5d9e";
          ctx.font = "bold 52px Courier New";
          ctx.fillText("SHIP BONKED!", W / 2, 190);
          ctx.fillStyle = "#f7f2db";
          ctx.font = "bold 22px Courier New";
          ctx.fillText(state.lastLossWasWin ? "A WIN WAS LOST" : "DODGE THE PINK GLITCH BOLTS", W / 2, 238);
        }

        if (state.mode === "lost") {
          ctx.fillStyle = "#ffd166";
          ctx.font = "bold 18px Courier New";
          ctx.fillText("PRESS ENTER TO TRY AGAIN", W / 2, 420);
        }
        ctx.textAlign = "left";
      }

      function drawUpgradeCard(number, y, title, detail, color) {
        pixelRect(W / 2 - 285, y - 25, 570, 60, "#171b43");
        pixelRect(W / 2 - 285, y - 25, 6, 60, color);
        ctx.textAlign = "left";
        ctx.fillStyle = color;
        ctx.fillText(`${number}  ${title}`, W / 2 - 255, y - 2);
        ctx.fillStyle = "#a9aed8";
        ctx.font = "bold 14px Courier New";
        ctx.fillText(detail, W / 2 - 255, y + 20);
        ctx.font = "bold 18px Courier New";
        ctx.textAlign = "center";
      }

      function drawAvatarCard(number, animal, x, y, color) {
        const option = avatarOptions.find(item => item.name === animal);
        const unlocked = state.unlocked.has(animal);
        const active = unlocked && state.player.animal === animal;
        pixelRect(x, y, 250, 105, active ? "#273b9d" : unlocked ? "#171b43" : "#25152b");
        pixelRect(x, y, 5, 105, color);
        ctx.textAlign = "left";
        ctx.fillStyle = color;
        ctx.font = "bold 18px Courier New";
        ctx.fillText(`${number}  ${animal.toUpperCase()}`, x + 20, y + 24);
        const preview = { x: x + 162, y: y + 35, w: 56, h: 48 };
        if (animal === "cat") drawCat(preview);
        else if (animal === "bunny") drawBunny(preview);
        else if (animal === "bear") drawBear(preview);
        else if (animal === "frog") drawFrog(preview);
        else drawFox(preview);
        ctx.fillStyle = active ? "#ffd166" : unlocked ? "#a9aed8" : "#ffd166";
        ctx.font = "bold 13px Courier New";
        ctx.fillText(active ? "CURRENT PILOT" : unlocked ? "READY TO FLY" : `BUY • ${option.cost} WINS`, x + 20, y + 55);
        ctx.textAlign = "center";
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = "#050617";
        ctx.fillRect(0, 0, W, H);

        for (const star of stars) {
          pixelRect(star.x, star.y, star.size, star.size, star.size > 2 ? "#ffd166" : "#8c94d8");
        }

        ctx.strokeStyle = "#171b43";
        ctx.lineWidth = 2;
        for (let y = 58 + ((state.time * 44) % 48); y < H; y += 48) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
          ctx.stroke();
        }

        drawShip(state.player);
        for (const monster of state.monsters) drawBoss(monster, monster.smiling || state.mode === "smiling");

        ctx.font = "bold 17px Courier New";
        ctx.textBaseline = "top";
        for (const donut of state.words) {
          drawDonut(donut);
          const core = deflectionCore(donut);
          pixelRect(core.x + 4, core.y + 3, 6, 6, "#5ee7f2");
        }

        for (const bolt of state.bolts) {
          pixelRect(bolt.x, bolt.y, bolt.w, bolt.h, "#ff5d9e");
          pixelRect(bolt.x + 3, bolt.y + 5, 4, 8, "#f7f2db");
        }

        for (const spark of state.sparks) {
          pixelRect(spark.x, spark.y, 5, 5, spark.color);
        }

        drawHud();
        drawOverlay();
      }

      function frame(now) {
        const dt = Math.min((now - last) / 1000 || 0, .034);
        last = now;
        update(dt);
        draw();
        requestAnimationFrame(frame);
      }

      addEventListener("keydown", event => {
        startMusic();
        const key = event.key.toLowerCase();
        if (["w", "a", "s", "d", " ", "enter", "1", "2", "3", "4", "5"].includes(key)) event.preventDefault();
        keys.add(key);
        if (key === " ") shootDonut();
        if (state.mode === "upgrade" && ["1", "2", "3"].includes(key)) {
          chooseUpgrade({ 1: "rapid", 2: "thrusters", 3: "shield" }[key]);
        } else if (["avatar", "start"].includes(state.mode) && ["1", "2", "3", "4", "5"].includes(key)) {
          chooseAvatar({ 1: "cat", 2: "bunny", 3: "frog", 4: "bear", 5: "fox" }[key]);
        }
        if (key === "enter" && state.mode === "lost") reset();
      });

      addEventListener("keyup", event => keys.delete(event.key.toLowerCase()));
      addEventListener("blur", () => keys.clear());

      canvas.addEventListener("pointerdown", event => {
        startMusic();
        const bounds = canvas.getBoundingClientRect();
        const x = (event.clientX - bounds.left) * W / bounds.width;
        const y = (event.clientY - bounds.top) * H / bounds.height;
        if (state.mode === "upgrade") {
          if (y >= 150 && y < 245) chooseUpgrade("rapid");
          else if (y >= 245 && y < 323) chooseUpgrade("thrusters");
          else if (y >= 323 && y < 415) chooseUpgrade("shield");
        } else if (state.mode === "avatar" || state.mode === "start") {
          if (x >= 75 && x < 325 && y >= 170 && y < 275) chooseAvatar("cat");
          else if (x >= 355 && x < 605 && y >= 170 && y < 275) chooseAvatar("bunny");
          else if (x >= 635 && x < 885 && y >= 170 && y < 275) chooseAvatar("frog");
          else if (x >= 215 && x < 465 && y >= 315 && y < 420) chooseAvatar("bear");
          else if (x >= 495 && x < 745 && y >= 315 && y < 420) chooseAvatar("fox");
        }
      });

      document.querySelectorAll("[data-key]").forEach(button => {
        const key = button.dataset.key;
        const press = event => { event.preventDefault(); startMusic(); keys.add(key); if (key === " ") shootDonut(); };
        const release = event => { event.preventDefault(); keys.delete(key); };
        button.addEventListener("pointerdown", press);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("pointerleave", release);
      });

      document.querySelector("#music-toggle").addEventListener("click", toggleMusic);

      reset();
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
